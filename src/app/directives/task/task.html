<div class="flex flex-col gap-4 w-full max-w-[500px] mt-5">

    @for (elt of mes_taches; track elt.id) {
    <div
        class="group relative flex items-start gap-4 p-6 bg-white border border-slate-200 rounded-2xl hover:border-slate-300 transition-all duration-200">

        <!-- Indicateur de priorité sous forme de petit point discret -->
        <div class="mt-2 flex-shrink-0 w-2 h-2 rounded-full" [ngClass]="{
             'bg-rose-500': elt.niveau === 'Haute',
             'bg-amber-400': elt.niveau === 'Moyen',
             'bg-emerald-500': elt.niveau === 'Basse'
           }">
        </div>

        <div class="flex-1 min-w-0">
            <div class="flex justify-between items-center mb-1">
                <h3 class="text-base font-semibold text-slate-900 truncate">{{ elt.titre }}</h3>
                <span class="text-[10px] font-medium text-slate-400">{{ elt.niveau }}</span>
            </div>

            <p class="text-sm text-slate-500 leading-relaxed">
                {{ elt.description || 'Aucune description disponible.' }}
            </p>

            <div class="mt-3 flex items-center text-[10px] font-medium text-slate-400 uppercase tracking-wider">
                <time>09 Juin 2026</time>
            </div>
        </div>
    </div>
    } @empty {
    <div class="py-12 text-center text-slate-400">
        <p class="text-sm">Aucune tâche active pour le moment.</p>
    </div>
    }

</div>
