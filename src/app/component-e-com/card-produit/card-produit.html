<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 p-6">
  @for (produit of produits; track produit.id) {
    <div class="bg-white border border-slate-200 rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 group">

      <div class="h-52 bg-slate-100 flex items-center justify-center overflow-hidden relative">
        @if (produit.image) {
          <img 
            [src]="produit.image" 
            [alt]="produit.nom"
            class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110"
          >
        } @else {
          <div class="flex flex-col items-center text-slate-400">
       
            <span class="text-[10px] mt-2 uppercase font-bold tracking-widest">Image non disponible</span>
          </div>
        }

     
      </div>

      <div class="p-6">
        <div class="flex justify-between items-start mb-2">
          <h3 class="text-xl font-bold text-slate-800 group-hover:text-blue-600 transition-colors uppercase tracking-tight">
            {{ produit.nom }}
          </h3>
        </div>
        
        <p class="text-slate-500 text-sm mb-6 line-clamp-2 leading-relaxed h-10">
          {{ produit.description }}
        </p>

        <div class="flex items-center justify-between pt-4 border-t border-slate-50">
          <div class="flex flex-col">
            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Prix TTC</span>
            <span class="text-2xl font-black text-slate-900 tracking-tighter">{{ produit.prix }}€</span>
          </div>

          <button 
      
            class="bg-blue-600 hover:bg-blue-700 text-white p-3.5 rounded-2xl transition-all shadow-md active:scale-90 hover:shadow-blue-200 flex items-center gap-2"
            title="Ajouter au panier"
            (click)="ajouterAuPanier(produit)"
          >
          Ajouter
          </button>
        </div>
      </div>
    </div>
  } @empty {
    <div class="text-center text-slate-400 col-span-full py-20 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200">
      <p class="text-xl font-medium italic">Aucun produit n'est disponible pour le moment.</p>
    </div>
  }
</div>
