<div class="bg-white border-b border-slate-200 sticky top-0 z-10 p-4 shadow-sm">
  <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-center gap-4">
    <span class="text-slate-400 text-[10px] font-black uppercase tracking-[0.2em] mr-2">Filtrer par :</span>
    
    <button (click)="filtrer('Tous')" 
      [class]="categorieActuelle ==='Tous' ? 'bg-amber-600 text-white shadow-lg shadow-amber-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'"
      class="px-6 py-2 rounded-full text-xs font-bold transition-all uppercase tracking-widest">
      Tout
    </button>
    
    <button (click)="filtrer('Entrée')" 
      [class]="categorieActuelle === 'Entrée' ? 'bg-amber-600 text-white shadow-lg shadow-amber-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'"
      class="px-6 py-2 rounded-full text-xs font-bold transition-all uppercase tracking-widest">
      Entrées
    </button>
    
    <button (click)="filtrer('Plat')" 
      [class]="categorieActuelle === 'Plat' ? 'bg-amber-600 text-white shadow-lg shadow-amber-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'"
      class="px-6 py-2 rounded-full text-xs font-bold transition-all uppercase tracking-widest">
      Plats
    </button>
    
    <button (click)="filtrer('Dessert')" 
      [class]="categorieActuelle === 'Dessert' ? 'bg-amber-600 text-white shadow-lg shadow-amber-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'"
      class="px-6 py-2 rounded-full text-xs font-bold transition-all uppercase tracking-widest">
      Desserts
    </button>
    
    <button (click)="filtrer('Boisson')" 
      [class]="categorieActuelle === 'Boisson' ? 'bg-amber-600 text-white shadow-lg shadow-amber-200' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'"
      class="px-6 py-2 rounded-full text-xs font-bold transition-all uppercase tracking-widest">
      Boissons
    </button>
  </div>
</div>

<div class="grid grid-col s -1 sm:grid-cols-2 lg:grid-cols-3 gap-8 p-8 max-w-7xl mx-auto">
  @for (produit of produitsAffiches; track produit.id) {
    <div class="bg-white rounded-[2rem] overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 group border border-slate-100 flex flex-col h-full">
      
      <div class="h-60 overflow-hidden relative">
        <img [src]="produit.image" [alt]="produit.nom" 
          class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
        <div class="absolute top-4 right-4">
          <span class="bg-white/80 backdrop-blur-sm px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-tighter text-slate-800">
            {{ produit.categorie }}
          </span>
        </div>
      </div>

      <div class="p-6 flex flex-col flex-grow">
        <div class="flex justify-between items-start mb-3">
          <h3 class="text-xl font-bold text-slate-900 group-hover:text-amber-600 transition-colors">
            {{ produit.nom }}
          </h3>
          <span class="text-lg font-black text-slate-900 underline decoration-amber-400 decoration-4 underline-offset-4">
            {{ produit.prix }}€
          </span>
        </div>

        <p class="text-slate-500 text-sm mb-8 line-clamp-2 italic">
          {{ produit.description }}
        </p>

        <button 
          (click)="allerAuxDetails(produit.id)"
          class="w-full mt-auto bg-slate-900 hover:bg-amber-600 text-white py-4 rounded-2xl font-bold text-[11px] uppercase tracking-[0.2em] transition-all duration-300 shadow-md active:scale-95">
          Voir les détails
        </button>
      </div>
    </div>
  } @empty {
    <div class="col-span-full py-20 text-center">
      <p class="text-slate-400 font-serif italic text-xl">Aucun délice trouvé dans cette catégorie.</p>
    </div>
  }
</div>
