@if (article) {
  <div class="max-w-5xl mx-auto p-6 lg:p-12 animate-fade-in">
    
    <button routerLink="/Articles" class="flex items-center text-slate-500 hover:text-amber-600 transition-colors mb-8 group">
      <span class="mr-2 transform group-hover:-translate-x-1 transition-transform">←</span>
      Retour à la carte
    </button>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-start">
      
      <div class="relative group">
        <div class="absolute -inset-1 bg-gradient-to-r from-amber-500 to-amber-200 rounded-[2.5rem] blur opacity-25"></div>
        <img [src]="article.image" [alt]="article.nom" 
             class="relative rounded-[2rem] w-full h-[500px] object-cover shadow-2xl">
        <span class="absolute top-6 left-6 bg-white/90 backdrop-blur-md px-4 py-1.5 rounded-full text-xs font-black uppercase tracking-widest text-slate-800 shadow-sm">
          {{ article.categorie }}
        </span>
      </div>

      <div class="flex flex-col">
        <h1 class="text-5xl font-serif font-bold text-slate-900 mb-4">{{ article.nom }}</h1>
        
        <div class="flex items-center gap-4 mb-8">
          <span class="text-3xl font-black text-amber-600">{{ article.prix }}€</span>
          <span class="text-slate-400">|</span>
          <span class="text-slate-500 text-sm italic">TVA incluse, service compris</span>
        </div>

        <div class="prose prose-slate mb-10">
          <h3 class="text-lg font-bold text-slate-800 uppercase tracking-wider mb-2">Description</h3>
          <p class="text-slate-600 leading-relaxed text-lg italic">"{{ article.description }}"</p>
        </div>

        <div class="bg-slate-50 rounded-3xl p-8 border border-slate-100">
          <h3 class="text-sm font-black text-slate-900 uppercase tracking-[0.2em] mb-6">Composition & Détails</h3>
          <ul class="space-y-4">
            @for (detail of article.details; track detail) {
              <li class="flex items-center text-slate-700">
                <span class="w-2 h-2 bg-amber-500 rounded-full mr-4"></span>
                {{ detail }}
              </li>
            }
          </ul>
        </div>

        <button class="mt-10 w-full bg-slate-900 text-white py-5 rounded-2xl font-bold uppercase tracking-widest hover:bg-amber-600 transition-all shadow-xl active:scale-95">
          Ajouter à ma commande
        </button>
      </div>
    </div>
  </div>
} @else {
  <div class="h-screen flex items-center justify-center">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-amber-600"></div>
  </div>
}
