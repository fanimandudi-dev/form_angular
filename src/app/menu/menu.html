<button (click)="toggleMenu()" class="lg:hidden fixed top-4 left-4 z-50 p-2 bg-blue-700 text-white rounded-lg shadow-md">
  @if (!isMobileMenuOpen) { <span>☰</span> } 
  @else { <span>✕</span> }
</button>

<aside [class.translate-x-0]="isMobileMenuOpen" 
       [class.-translate-x-full]="!isMobileMenuOpen"
       class="fixed inset-y-0 left-0 z-40 w-64 bg-white border-r border-gray-200 transition-transform duration-300 lg:translate-x-0 lg:static lg:h-screen flex flex-col shadow-sm">
  
  <div class="p-6 flex items-center gap-3 border-b border-gray-50 bg-gray-50/50">
    <div class="h-10 w-10 bg-blue-700 rounded-xl flex items-center justify-center text-white shadow-lg flex-shrink-0">
      <span class="font-bold">IC</span>
    </div>
    <div class="overflow-hidden">
      <h2 class="text-xs font-black text-gray-900 tracking-tighter uppercase truncate">Coordination</h2>
      <p class="text-[10px] text-blue-600 font-bold uppercase tracking-widest truncate">Intercession</p>
    </div>
  </div>

  <nav class="flex-1 p-4 space-y-1 overflow-y-auto custom-scrollbar">
    @for (item of menuItems; track item.label) {
      <a [routerLink]="item.route"
         routerLinkActive="bg-blue-600 text-white shadow-lg shadow-blue-100"
         (click)="isMobileMenuOpen = false"
         class="flex items-center gap-4 px-4 py-3 rounded-xl text-gray-500 hover:bg-blue-50 hover:text-blue-600 transition-all group outline-none">
        
        <span [innerHTML]="item.icon | safeHtml" class="w-5 h-5 transition-transform group-hover:scale-110"></span>
        <span class="font-bold text-sm">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="p-4 border-t border-gray-100">
    <div class="flex items-center gap-3 p-2 hover:bg-gray-50 rounded-xl cursor-pointer group transition-colors">
      <div class="h-8 w-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 font-bold text-xs">SB</div>
      <div class="flex-1 overflow-hidden text-left">
        <p class="text-xs font-bold text-gray-900 truncate">STEPHEN BOYO</p>
        <p class="text-[10px] text-gray-400 font-medium">Coordinateur Principal</p>
      </div>
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-gray-400 group-hover:text-red-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7" />
      </svg>
    </div>
  </div>
</aside>

@if (isMobileMenuOpen) {
  <div (click)="toggleMenu()" class="fixed inset-0 bg-black/40 backdrop-blur-[2px] z-30 lg:hidden animate-fade-in"></div>
}
