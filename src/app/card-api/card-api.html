<div class="flex flex-col gap-4 w-full max-w-[500px] mt-5">
    @for (post of posts(); track post.id) {
    <div
        class="group relative flex items-start gap-4 p-6 bg-white border border-slate-200 rounded-2xl hover:border-slate-300 transition-all duration-200">

        <div class="mt-2 flex-shrink-0 w-2 h-2 rounded-full bg-emerald-500"></div>

        <div class="flex-1 min-w-0">
            <div class="flex justify-between items-center mb-1">
                <h3 class="text-base font-semibold text-slate-900 truncate">{{ post.title }}</h3>
                <span class="text-[10px] font-medium text-slate-400">POST</span>
            </div>

            <p class="text-sm text-slate-500 leading-relaxed line-clamp-2">
                {{ post.body }}
            </p>

            <div class="mt-3 flex items-center text-[10px] font-medium text-slate-400 uppercase tracking-wider">
                <time>09 Juin 2026</time>
            </div>
        </div>
    </div>
    } @empty {
    <div class="py-12 text-center text-slate-400">
        <p class="text-sm">Chargement ou aucune donnée disponible...</p>
    </div>
    }
</div>
