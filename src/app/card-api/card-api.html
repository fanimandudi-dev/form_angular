<div class="container mx-auto px-4 mt-8">
    <h2 class="text-2xl font-bold text-slate-800 mb-6 px-2">Mes Tâches</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        @for (post of posts(); track post.id) {
        <div
            class="group relative flex flex-col p-6 bg-white border border-slate-200 rounded-3xl shadow-sm hover:shadow-lg hover:border-indigo-200 transition-all duration-300">

            <div class="absolute top-6 left-0 w-1.5 h-8 bg-indigo-500 rounded-r-lg"></div>

            <div class="pl-4">
                <div class="flex justify-between items-start mb-3">
                    <h3 class="text-lg font-bold text-slate-900 leading-snug line-clamp-1">{{ post.title }}</h3>
                </div>

                <p class="text-sm text-slate-600 leading-relaxed mb-6 line-clamp-3">
                    {{ post.body }}
                </p>

                <div class="mt-auto flex items-center justify-between pt-4 border-t border-slate-100">
                    <span
                        class="text-[10px] font-bold uppercase tracking-widest text-slate-400 bg-slate-100 px-2 py-1 rounded-md">
                        Post ID: {{ post.id }}
                    </span>
                    <time class="text-[11px] font-medium text-slate-400">10 Juin 2026</time>
                </div>
            </div>
        </div>
        } @empty {
        <div class="col-span-full py-16 text-center">
            <p class="text-slate-400 font-medium">Aucune tâche disponible.</p>
        </div>
        }
    </div>
</div>
