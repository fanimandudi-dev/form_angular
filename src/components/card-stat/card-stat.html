<div [ngClass]="getthemes()" 
     class=" h-[200px]  border-2 shadow-lg rounded-lg flex flex-col items-center justify-center gap-3 p-4 transition-all">

    <p class="font-medium text-sm md:text-base text-center leading-tight">
      {{titre_carte}}
    </p>

    <p [ngClass]="gettext()" class="font-bold text-2xl md:text-3xl">
      {{valeur}}
    </p>
@for(produit of produits; track produit) {
  <p> id: {{produit.id}}</p>
  <p> nom :{{produit.nom}}</p>
  <p> prix :{{produit.prix}}</p>
  <p>description :{{produit.description}}</p>
  <p>quantité:{{produit.quantite}}</p>
}


   
</div>
