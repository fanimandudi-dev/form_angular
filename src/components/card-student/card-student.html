<div class="  h-[265px] shadow-lg rounded-lg px-8 py-2 flex flex-col lg:w-[500px]   "[class]="cardcolor">

<div class="relative  max-h-[80%] grow-2">
<p class="absolute top-4 right-3 inline px-5 py-2 rounded-sm text-xs" [class]="badge">Reussite</p>
 <p class="text-xl font-bold mt-5">{{etudiant.prenom}} {{etudiant.nom}}</p>
 <p class="text-sm text-gray-500 mt-3">classe : {{etudiant.classe}}</p>

 <div class="mt-5">
 <p class="font-medium mb-4">Notes :</p>
 @for(note of etudiant.notes;track $index){
<p class="inline bg-gray-200 px-2 py-1 rounded mr-4">{{note}}</p>
 }

 </div>

</div>


<div class="flex justify-between items-center   max-h[20%]">
     <p class="text-lg font-medium text-gray-700">Moyenne : {{moyenne}}</p>
<button (click)="supprimer_etudiant()" type="submit" class="px-3 py-2 grow-0 bg-red-500 text-white rounded hover:bg-red-600"> Supprimer</button>

</div>



</div>
